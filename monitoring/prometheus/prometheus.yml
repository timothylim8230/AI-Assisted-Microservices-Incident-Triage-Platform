global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "service-a"
    metrics_path: /metrics
    static_configs:
      - targets: ["service-a:5000"]

  - job_name: "service-b"
    metrics_path: /metrics
    static_configs:
      - targets: ["service-b:5001"]